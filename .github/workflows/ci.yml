name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root deps
        run: npm ci
      - name: Frontend tests
        run: npm test
      - name: Install server deps
        run: cd server && npm ci
      - name: Server tests
        run: cd server && npm test

